<!DOCTYPE html><html lang="pt-br"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><link rel="manifest" href="manifest.json"><title>SISTEMA JDP</title><style>
                    body { background:#000; color:#0f0; font-family:monospace; margin:0; padding: 20px; overflow-y:auto; box-sizing: border-box; min-height: 100vh; display: flex; flex-direction: column; }
                    #term { width:100%; text-align:left; font-size:16px; color:#0f0; text-shadow:0 0 5px #0f0; line-height: 1.5; flex-grow: 1; }
                    .error-line { color: #ff3333; text-shadow: 0 0 5px #ff3333; font-weight: bold; }
                    .success-line { color: #00ff88; text-shadow: 0 0 5px #00ff88; }
                    #muralha { display:none; text-align:center; animation: fadeIn 2s; margin: auto; }
                    .logo { width:150px; filter:drop-shadow(0 0 10px #bf953f); margin-bottom:20px; }
                    .btn-w { display:inline-block; margin-top:20px; padding:15px 30px; background:#25d366; color:#fff; text-decoration:none; border-radius:5px; font-weight:bold; font-family:sans-serif; }
                    #prompt-container { display: flex; margin-top: 10px; align-items: center; }
                    #input-line { background: transparent; border: none; color: #0f0; font-family: monospace; font-size: 16px; outline: none; width: 100%; text-shadow: 0 0 5px #0f0; }
                    @keyframes fadeIn { from {opacity:0} to {opacity:1} }
                </style></head><body>
                <div id="term"></div>
                
                <div id="prompt-container" style="display:none;">
                    <span style="color:#0f0; margin-right: 10px;">&gt; DIGITE A CHAVE DE ACESSO:</span>
                    <input type="password" id="input-line" autofocus autocomplete="off" />
                </div>

                <div id="muralha">
                    <img class="logo" src="https://raw.githubusercontent.com/pradodalapa-hue/fotos-industrial/main/img/jdp_1777000164292_icon_512_1_.png">
                    <h2 style="color:#bf953f">ACESSO BLOQUEADO</h2>
                    <p style="color:#fff; font-family:sans-serif;">ESTE DISPOSITIVO FOI IDENTIFICADO E BLOQUEADO.</p>
                    <a href="https://wa.me/5592984846058" class="btn-w">FALAR COM MESTRE JOSÉ</a>
                </div>
                <script>
                    const C = { id:'JDP_TURBO0', d:'pradodalapa-hue.github.io' };
                    const t = document.getElementById('term');
                    const m = document.getElementById('muralha');
                    const promptContainer = document.getElementById('prompt-container');
                    const inputLine = document.getElementById('input-line');

                    let typedKey = "";

                    // ==========================================
                    // GERENCIADOR INTEGRADO INDEXEDDB (COFRE SEGURO CLIENT-SIDE)
                    // ==========================================
                    const DB_NAME = "JDP_SECURE_STORE";
                    const STORE_NAME = "VaultData";

                    function openDB() {
                        return new Promise((resolve, reject) => {
                            const request = indexedDB.open(DB_NAME, 1);
                            request.onupgradeneeded = (e) => {
                                const db = e.target.result;
                                if (!db.objectStoreNames.contains(STORE_NAME)) {
                                    db.createObjectStore(STORE_NAME);
                                }
                            };
                            request.onsuccess = (e) => resolve(e.target.result);
                            request.onerror = (e) => reject(e.target.error);
                        });
                    }

                    async function setLocalPayload(key, val) {
                        try {
                            const db = await openDB();
                            return new Promise((resolve, reject) => {
                                const tx = db.transaction(STORE_NAME, "readwrite");
                                const store = tx.objectStore(STORE_NAME);
                                const req = store.put(val, key);
                                req.onsuccess = () => resolve();
                                req.onerror = () => reject(req.error);
                            });
                        } catch(e) { console.error("IndexedDB Error", e); }
                    }

                    async function getLocalPayload(key) {
                        try {
                            const db = await openDB();
                            return new Promise((resolve, reject) => {
                                const tx = db.transaction(STORE_NAME, "readonly");
                                const store = tx.objectStore(STORE_NAME);
                                const req = store.get(key);
                                req.onsuccess = () => resolve(req.result);
                                req.onerror = () => reject(req.error);
                            });
                        } catch(e) { return null; }
                    }

                    function writeTerm(text, className = '') {
                        const div = document.createElement('div');
                        if(className) div.className = className;
                        div.innerHTML = text;
                        t.appendChild(div);
                        window.scrollTo(0, document.body.scrollHeight);
                    }

                    async function type(lines, className = '') {
                        for(let line of lines) {
                            let currentText = "";
                            const div = document.createElement('div');
                            if(className) div.className = className;
                            t.appendChild(div);
                            for(let i=0; i<line.length; i++) {
                                currentText += line.charAt(i);
                                div.innerHTML = currentText;
                                await new Promise(r => setTimeout(r, 20));
                            }
                            await new Promise(r => setTimeout(r, 300));
                        }
                    }

                    function showMuralha() {
                        setTimeout(() => {
                            t.style.display = 'none';
                            promptContainer.style.display = 'none';
                            m.style.display = 'block';
                        }, 1000);
                    }

                    function base64ToUint8Array(base64) {
                        const binaryString = atob(base64);
                        const len = binaryString.length;
                        const bytes = new Uint8Array(len);
                        for (let i = 0; i < len; i++) {
                            bytes[i] = binaryString.charCodeAt(i);
                        }
                        return bytes;
                    }

                    async function deriveKey(password, salt) {
                        const encoder = new TextEncoder();
                        const baseKey = await crypto.subtle.importKey("raw", encoder.encode(password), "PBKDF2", false, ["deriveKey"]);
                        return crypto.subtle.deriveKey(
                            { name: "PBKDF2", salt: salt, iterations: 100000, hash: "SHA-256" },
                            baseKey,
                            { name: "AES-GCM", length: 256 },
                            false,
                            ["decrypt"]
                        );
                    }

                    async function decryptPayload(encryptedObj, password) {
                        const decoder = new TextDecoder();
                        const ciphertext = base64ToUint8Array(encryptedObj.ciphertext);
                        const iv = base64ToUint8Array(encryptedObj.iv);
                        const salt = base64ToUint8Array(encryptedObj.salt);
                        
                        const key = await deriveKey(password, salt);
                        const decrypted = await crypto.subtle.decrypt(
                            { name: "AES-GCM", iv: iv },
                            key,
                            ciphertext
                        );

                        // PROTOCOLO ANTI-FORENSE: Zero-Fill imediato
                        ciphertext.fill(0);
                        iv.fill(0);
                        salt.fill(0);

                        return decoder.decode(decrypted);
                    }

                    function wipeMemoryAndBoot(decryptedHtml) {
                        document.open();
                        document.write(decryptedHtml);
                        document.close();
                        
                        setTimeout(() => {
                            typedKey = null;
                            window.C = null;
                            window.decryptPayload = null;
                            window.base64ToUint8Array = null;
                            window.deriveKey = null;
                            window.getLocalPayload = null;
                            window.setLocalPayload = null;
                            if (window.gc) window.gc();
                        }, 500);
                    }

                    inputLine.addEventListener('keydown', async (e) => {
                        if (e.key === 'Enter') {
                            typedKey = inputLine.value.trim();
                            promptContainer.style.display = 'none';
                            inputLine.value = "";
                            
                            if (!typedKey) {
                                await type(["&gt; CHAVE INVÁLIDA."], "error-line");
                                showMuralha();
                                return;
                            }
                            
                            await processarDecodificacao();
                        }
                    });

                    async function processarDecodificacao() {
                        writeTerm("&gt; VALIDANDO CHAVE DE CRIPTOGRAFIA...");
                        const localCachedPayload = await getLocalPayload(C.id);

                        if (!navigator.onLine) {
                            writeTerm("&gt; MODO OFFLINE ATIVO. ACESSANDO COFRE RESILIENTE...", "success-line");
                            if (localCachedPayload) {
                                try {
                                    const decryptedHtml = await decryptPayload(localCachedPayload, typedKey);
                                    writeTerm("&gt; DESCRIPTOGRAFIA OFFLINE CONCLUÍDA. BOOT IMEDIATO...", "success-line");
                                    wipeMemoryAndBoot(decryptedHtml);
                                    return;
                                } catch(e) {
                                    await type(["&gt; ERRO CRÍTICO: Chave incorreta para o cofre offline."], "error-line");
                                    showMuralha();
                                    return;
                                }
                            } else {
                                await type([
                                    "&gt; ERRO: Sem conexão de rede e sem cache local salvo!",
                                    "&gt; Conecte-se online para realizar a primeira sincronização."
                                ], "error-line");
                                showMuralha();
                                return;
                            }
                        }

                        try {
                            writeTerm("&gt; CONECTANDO AO SERVIDOR DE LICENÇAS CENTRAL...");
                            const r = await fetch('https://raw.githubusercontent.com/pradodalapa-hue/Tetstserbidor/main/clientes.json?t='+Date.now());
                            if(!r.ok) throw new Error("Servidor fora do ar");
                            
                            const d = await r.json();
                            const u = d.find(i => i.id === C.id && i.apiKey === typedKey);
                            
                            if(u && u.status === 'ativo') {
                                writeTerm("&gt; AUTORIZAÇÃO VALIDADA COM SUCESSO.", "success-line");
                                const r2 = await fetch('https://raw.githubusercontent.com/pradodalapa-hue/Tetstserbidor/main/' + u.path + 'payload.json');
                                const encryptedPayloadObj = await r2.json();
                                
                                await setLocalPayload(C.id, encryptedPayloadObj);
                                
                                writeTerm("&gt; DERIVANDO CHAVE PBKDF2 (100.000 ITERAÇÕES)...");
                                try {
                                    const decryptedHtml = await decryptPayload(encryptedPayloadObj, typedKey);
                                    writeTerm("&gt; SUCESSO. BOOT DA APLICAÇÃO ATIVO...", "success-line");
                                    await new Promise(r => setTimeout(r, 200));
                                    wipeMemoryAndBoot(decryptedHtml);
                                } catch(decError) {
                                    await type(["&gt; ERRO INTERNO: Falha de hardware na descriptografia AES."], "error-line");
                                    showMuralha();
                                }
                            } else {
                                await type(["&gt; ACESSO REJEITADO: Credencial incorreta ou revogada."], "error-line");
                                showMuralha();
                            }
                        } catch(e) {
                            if (localCachedPayload) {
                                writeTerm("&gt; [!] Servidor instável. Tentando descriptografar localmente...", "error-line");
                                try {
                                    const decryptedHtml = await decryptPayload(localCachedPayload, typedKey);
                                    wipeMemoryAndBoot(decryptedHtml);
                                } catch(err) { showMuralha(); }
                            } else {
                                await type(["&gt; ERRO CRÍTICO: Falha de conexão e sem cache local."], "error-line");
                                showMuralha();
                            }
                        }
                    }

                    async function iniciar() {
                        writeTerm("&gt; INICIANDO KERNEL TRADUTOR JDP v16.7-DIAMOND...");
                        await new Promise(r => setTimeout(r, 400));
                        
                        if(window.location.hostname !== C.d && !window.location.hostname.includes('github.io') && window.location.hostname !== 'localhost' && window.location.hostname !== '127.0.0.1') {
                            await type([
                                "&gt; ERRO CRÍTICO: VIOLAÇÃO DE DOMÍNIO!",
                                "&gt; ACESSO REJEITADO PELO SERVIDOR CENTRAL JDP."
                            ], "error-line");
                            showMuralha();
                            return;
                        }

                        promptContainer.style.display = 'flex';
                        inputLine.focus();
                    }

                    if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
                    iniciar();
                </script></body></html>
